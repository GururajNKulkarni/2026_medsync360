<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @page { size: 232mm 430mm; margin: 8mm; }
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  html,body { margin:0; padding:0; }
  svg { width:100%; height:auto; display:block; font-family:'Segoe UI', Arial, sans-serif; }
  .nt { font-weight:700; }
  .ns { fill:#475569; }
  .phase-title { font-size:13px; fill:#64748b; font-weight:600; }
  .swim { font-size:12px; fill:#94a3b8; font-weight:700; letter-spacing:1px; }
  .edge-lbl { font-size:11px; fill:#475569; }
</style>
</head>
<body>
<svg viewBox="0 0 1000 1900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- ===================== PHASE CONTAINERS ===================== -->
  <g fill="none" stroke="#cbd5e1" stroke-width="1.3" stroke-dasharray="5 4">
    <rect x="55" y="30"   width="900" height="375" rx="8"/>
    <rect x="55" y="420"  width="900" height="220" rx="8"/>
    <rect x="55" y="655"  width="900" height="190" rx="8"/>
    <rect x="55" y="860"  width="900" height="470" rx="8"/>
    <rect x="55" y="1345" width="900" height="200" rx="8"/>
    <rect x="55" y="1560" width="900" height="280" rx="8"/>
  </g>
  <g text-anchor="middle">
    <rect x="380" y="34" width="240" height="18" fill="#ffffff"/><text class="phase-title" x="500" y="47">Phase 1 — Referral creation</text>
    <rect x="385" y="424" width="230" height="18" fill="#ffffff"/><text class="phase-title" x="500" y="437">Phase 2 — Receiver actions</text>
    <rect x="330" y="659" width="340" height="18" fill="#ffffff"/><text class="phase-title" x="500" y="672">Phase 3 — Completion workflow (3-step wizard)</text>
    <rect x="385" y="864" width="230" height="18" fill="#ffffff"/><text class="phase-title" x="500" y="877">Phase 4 — Close or Transfer</text>
    <rect x="360" y="1349" width="280" height="18" fill="#ffffff"/><text class="phase-title" x="500" y="1362">Phase 5 — Transfer chain (multi-hop)</text>
    <rect x="300" y="1564" width="400" height="18" fill="#ffffff"/><text class="phase-title" x="500" y="1577">Medication journey — complete trail across the chain</text>
  </g>
  <!-- swimlane labels -->
  <g text-anchor="middle">
    <text class="swim" transform="translate(28,210) rotate(-90)">PHASE 1</text>
    <text class="swim" transform="translate(28,530) rotate(-90)">PHASE 2</text>
    <text class="swim" transform="translate(28,750) rotate(-90)">PHASE 3</text>
    <text class="swim" transform="translate(28,1095) rotate(-90)">PHASE 4</text>
    <text class="swim" transform="translate(28,1445) rotate(-90)">PHASE 5</text>
    <text class="swim" transform="translate(28,1700) rotate(-90)">TRAIL</text>
  </g>

  <!-- ===================== EDGES (drawn first, under nodes) ===================== -->
  <g fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)">
    <!-- phase 1 -->
    <path d="M500,128 L500,150"/>
    <path d="M500,212 L500,242"/>
    <path d="M388,278 L250,278"/>           <!-- to Sender -->
    <path d="M612,278 L750,278"/>           <!-- to Receiver -->
    <path d="M500,314 L500,338"/>
    <!-- phase 1 -> 2 -->
    <path d="M500,400 L500,470"/>
    <!-- phase 2 -->
    <path d="M575,505 L735,505"/>           <!-- decline -->
    <path d="M500,548 L500,578"/>           <!-- accept -->
    <!-- phase 2 -> 3 -->
    <path d="M500,632 L500,700"/>
    <!-- phase 3 -->
    <path d="M500,762 L500,790"/>
    <!-- phase 3 -> 4 (to diamond) -->
    <path d="M500,840 L500,902"/>
    <!-- diamond split -->
    <path d="M430,930 L250,930 L250,978"/>  <!-- close branch -->
    <path d="M570,930 L735,930 L735,978"/>  <!-- transfer branch -->
    <!-- left close column -->
    <path d="M250,1042 L250,1066"/>
    <path d="M250,1118 L250,1142"/>
    <path d="M250,1194 L250,1218"/>
    <!-- right transfer column -->
    <path d="M735,1042 L735,1066"/>
    <path d="M735,1118 L735,1150"/>
    <path d="M735,1222 L735,1246"/>
    <!-- phase 4 -> 5 -->
    <path d="M250,1392 L180,1392 L180,1408"/>
    <path d="M340,1430 L420,1430"/>         <!-- A->B -->
    <path d="M660,1430 L740,1430"/>         <!-- B->C (drawn below as straight) -->
    <path d="M260,1456 L360,1480"/>         <!-- to transfer_history -->
    <!-- phase 5 -> trail -->
    <path d="M500,1700 L300,1740 L300,1762"/>
    <path d="M500,1700 L700,1740 L700,1762"/>
  </g>
  <!-- A->B and B->C horizontal arrows in phase 5 -->
  <g fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)">
    <path d="M300,1430 L408,1430"/>
    <path d="M620,1430 L728,1430"/>
  </g>
  <!-- medication step connectors (phase trail) -->
  <g fill="none" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arr)">
    <path d="M218,1648 L240,1648"/>
    <path d="M398,1648 L420,1648"/>
    <path d="M578,1648 L600,1648"/>
    <path d="M758,1648 L780,1648"/>
  </g>
  <!-- 5-steps down to trail RPC -->
  <g fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)">
    <path d="M500,1690 L500,1700"/>
  </g>
  <!-- loops to Phase 2 (dashed, right side) -->
  <path d="M905,1270 C955,1270 955,505 905,505" fill="none" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <text class="edge-lbl" x="958" y="890" text-anchor="middle" transform="rotate(90,958,890)" fill="#94a3b8">loops to Phase 2</text>

  <!-- edge labels -->
  <g text-anchor="middle" class="edge-lbl">
    <text x="655" y="497">Decline</text>
    <text x="520" y="568">Accept</text>
    <text x="300" y="922">Close</text>
    <text x="690" y="922">Transfer</text>
  </g>

  <!-- ===================== NODES ===================== -->
  <!-- helper note: rect + title + subtitle -->

  <!-- PHASE 1 -->
  <g text-anchor="middle">
    <!-- start -->
    <rect x="385" y="78" width="230" height="50" rx="25" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="500" y="108" class="nt" fill="#334155" font-size="14">Doctor opens form</text>

    <!-- ReferralForm (ui) -->
    <rect x="345" y="150" width="310" height="62" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="500" y="176" class="nt" fill="#5b21b6" font-size="13">ReferralForm.tsx</text>
    <text x="500" y="195" class="ns" font-size="10.5">Patient info · department · urgency · medication</text>

    <!-- referrals INSERT (db) -->
    <rect x="345" y="248" width="310" height="62" rx="8" fill="#d1fae5" stroke="#34d399" stroke-width="1.5"/>
    <text x="500" y="274" class="nt" fill="#065f46" font-size="13">referrals INSERT</text>
    <text x="500" y="293" class="ns" font-size="10.5">status: Received · from_user_id · medication_given</text>

    <!-- Sender (side) -->
    <rect x="120" y="252" width="130" height="52" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="185" y="274" class="nt" fill="#475569" font-size="12">Sender</text>
    <text x="185" y="291" class="ns" font-size="10">Sent tab</text>

    <!-- Receiver (side) -->
    <rect x="750" y="252" width="130" height="52" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="815" y="274" class="nt" fill="#475569" font-size="12">Receiver</text>
    <text x="815" y="291" class="ns" font-size="10">Received tab</text>

    <!-- med_history initial (med) -->
    <rect x="345" y="338" width="310" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="500" y="363" class="nt" fill="#92400e" font-size="13">medication_history INSERT</text>
    <text x="500" y="382" class="ns" font-size="10.5">update_type: initial  (DB trigger)</text>
  </g>

  <!-- PHASE 2 -->
  <g text-anchor="middle">
    <!-- decision diamond -->
    <polygon points="500,470 600,505 500,540 400,505" fill="#fffef5" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="500" y="509" class="nt" fill="#334155" font-size="12">Receiver action?</text>

    <!-- decline (red dashed) -->
    <rect x="735" y="480" width="180" height="52" rx="8" fill="#fef2f2" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="825" y="502" class="nt" fill="#991b1b" font-size="12.5">Decline</text>
    <text x="825" y="519" class="ns" font-size="10" fill="#b91c1c">status → Cancelled</text>

    <!-- accept (db/green) -->
    <rect x="345" y="578" width="310" height="54" rx="8" fill="#d1fae5" stroke="#34d399" stroke-width="1.5"/>
    <text x="500" y="600" class="nt" fill="#065f46" font-size="13">Accept referral</text>
    <text x="500" y="618" class="ns" font-size="10.5">status → Acknowledged · start_time set</text>
  </g>

  <!-- PHASE 3 -->
  <g text-anchor="middle">
    <rect x="330" y="700" width="340" height="60" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="500" y="725" class="nt" fill="#5b21b6" font-size="13">Step 1 — Patient attendance?</text>
    <text x="500" y="744" class="ns" font-size="10.5">Yes (update medication) · No (provide reasons)</text>

    <rect x="330" y="790" width="340" height="50" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="500" y="811" class="nt" fill="#5b21b6" font-size="13">Step 2 — Choose action</text>
    <text x="500" y="829" class="ns" font-size="10.5">Close referral · Transfer referral</text>
  </g>

  <!-- PHASE 4 -->
  <g text-anchor="middle">
    <!-- diamond -->
    <polygon points="500,902 595,930 500,958 405,930" fill="#fffef5" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="500" y="934" class="nt" fill="#334155" font-size="12">Close or Transfer?</text>

    <!-- LEFT: Close column -->
    <rect x="105" y="978" width="290" height="56" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="250" y="1001" class="nt" fill="#5b21b6" font-size="13">Step 3 — Diagnosis</text>
    <text x="250" y="1019" class="ns" font-size="10.5">Category · details · notes</text>

    <rect x="105" y="1066" width="290" height="52" rx="8" fill="#d1fae5" stroke="#34d399" stroke-width="1.5"/>
    <text x="250" y="1087" class="nt" fill="#065f46" font-size="13">complete_referral RPC</text>
    <text x="250" y="1105" class="ns" font-size="10.5">status → Closed · end_time · diagnosis</text>

    <rect x="105" y="1142" width="290" height="52" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="250" y="1163" class="nt" fill="#92400e" font-size="12.5">medication_history INSERT</text>
    <text x="250" y="1181" class="ns" font-size="10.5">update_type: completion_update</text>

    <rect x="105" y="1218" width="290" height="52" rx="8" fill="#ecfccb" stroke="#84cc16" stroke-width="1.5"/>
    <text x="250" y="1239" class="nt" fill="#3f6212" font-size="13">Excel report generated</text>
    <text x="250" y="1257" class="ns" font-size="10.5">Full trail · transfer history · diagnosis</text>

    <!-- RIGHT: Transfer column -->
    <rect x="590" y="978" width="290" height="56" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="735" y="1001" class="nt" fill="#1e40af" font-size="13">ReferralTransferModal</text>
    <text x="735" y="1019" class="ns" font-size="10.5">Dept · doctor · reason · notes · files</text>

    <rect x="590" y="1066" width="290" height="52" rx="8" fill="#d1fae5" stroke="#34d399" stroke-width="1.5"/>
    <text x="735" y="1087" class="nt" fill="#065f46" font-size="13">transfer_referral RPC</text>
    <text x="735" y="1105" class="ns" font-size="10.5">Atomic: read · insert · update · copy files</text>

    <!-- original / new split -->
    <rect x="590" y="1150" width="138" height="52" rx="8" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
    <text x="659" y="1171" class="nt" fill="#991b1b" font-size="12">Original</text>
    <text x="659" y="1188" class="ns" font-size="10" fill="#b91c1c">→ Transferred</text>

    <rect x="742" y="1150" width="138" height="52" rx="8" fill="#d1fae5" stroke="#34d399" stroke-width="1.5"/>
    <text x="811" y="1171" class="nt" fill="#065f46" font-size="12">New referral</text>
    <text x="811" y="1188" class="ns" font-size="10">→ Received</text>

    <rect x="590" y="1246" width="290" height="52" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="735" y="1267" class="nt" fill="#92400e" font-size="12.5">medication_history INSERT</text>
    <text x="735" y="1285" class="ns" font-size="10.5">update_type: transfer_update</text>
    <!-- connector original->med and new->phase5 -->
    <path d="M659,1202 L659,1232 L690,1246" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/>
  </g>

  <!-- PHASE 5 -->
  <g text-anchor="middle">
    <rect x="60" y="1402" width="240" height="56" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="180" y="1425" class="nt" fill="#5b21b6" font-size="13">Referral A</text>
    <text x="180" y="1443" class="ns" font-size="10.5">Dr. Smith → Dr. Jones</text>

    <rect x="408" y="1402" width="212" height="56" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="514" y="1425" class="nt" fill="#5b21b6" font-size="13">Referral B</text>
    <text x="514" y="1443" class="ns" font-size="10.5">Dr. Jones → Dr. Patel</text>

    <rect x="728" y="1402" width="212" height="56" rx="8" fill="#d1fae5" stroke="#34d399" stroke-width="1.5"/>
    <text x="834" y="1425" class="nt" fill="#065f46" font-size="13">Referral C</text>
    <text x="834" y="1443" class="ns" font-size="10.5">Dr. Patel closes</text>

    <text x="360" y="1472" class="ns" font-size="9.5" text-anchor="middle">transfer_parent_id = A.id</text>
    <text x="690" y="1472" class="ns" font-size="9.5" text-anchor="middle">transfer_parent_id = B.id</text>

    <rect x="200" y="1480" width="420" height="50" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="410" y="1501" class="nt" fill="#1e40af" font-size="12.5">get_referral_transfer_history RPC</text>
    <text x="410" y="1518" class="ns" font-size="10">Returns full chain: from/to doctor · dept · reason · timestamp</text>
  </g>

  <!-- TRAIL: 5 steps -->
  <g text-anchor="middle">
    <!-- step 1 -->
    <rect x="62" y="1610" width="156" height="76" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="140" y="1634" class="nt" fill="#92400e" font-size="11.5">Step 1</text>
    <text x="140" y="1651" class="ns" font-size="10">Created referral</text>
    <text x="140" y="1672" class="ns" font-size="9.5" fill="#b45309">initial</text>
    <!-- step 2 -->
    <rect x="242" y="1610" width="156" height="76" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="320" y="1634" class="nt" fill="#92400e" font-size="11.5">Step 2</text>
    <text x="320" y="1651" class="ns" font-size="10">Initial med set</text>
    <text x="320" y="1672" class="ns" font-size="9.5" fill="#b45309">initial</text>
    <!-- step 3 -->
    <rect x="422" y="1610" width="156" height="76" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="500" y="1634" class="nt" fill="#1e40af" font-size="11.5">Step 3</text>
    <text x="500" y="1651" class="ns" font-size="10">Updated on transfer</text>
    <text x="500" y="1672" class="ns" font-size="9.5" fill="#2563eb">transfer_update</text>
    <!-- step 4 -->
    <rect x="602" y="1610" width="156" height="76" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="680" y="1634" class="nt" fill="#5b21b6" font-size="11.5">Step 4</text>
    <text x="680" y="1651" class="ns" font-size="10">Received transfer</text>
    <text x="680" y="1672" class="ns" font-size="9.5" fill="#7c3aed">received</text>
    <!-- step 5 -->
    <rect x="782" y="1610" width="156" height="76" rx="8" fill="#d1fae5" stroke="#34d399" stroke-width="1.5"/>
    <text x="860" y="1634" class="nt" fill="#065f46" font-size="11.5">Step 5</text>
    <text x="860" y="1651" class="ns" font-size="10">Completed</text>
    <text x="860" y="1672" class="ns" font-size="9.5" fill="#059669">completion_update</text>

    <!-- trail RPC -->
    <rect x="170" y="1700" width="660" height="50" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="500" y="1721" class="nt" fill="#1e40af" font-size="12.5">get_complete_medication_trail RPC</text>
    <text x="500" y="1738" class="ns" font-size="10">Aggregates all steps across the entire transfer chain · doctor · dept · medication · timestamp per step</text>

    <!-- outputs -->
    <rect x="160" y="1762" width="280" height="52" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="300" y="1783" class="nt" fill="#5b21b6" font-size="12.5">ReferralDetails timeline</text>
    <text x="300" y="1801" class="ns" font-size="10">Inline medication journey UI</text>

    <rect x="560" y="1762" width="280" height="52" rx="8" fill="#ecfccb" stroke="#84cc16" stroke-width="1.5"/>
    <text x="700" y="1783" class="nt" fill="#3f6212" font-size="12.5">Excel report section</text>
    <text x="700" y="1801" class="ns" font-size="10">Complete med journey + summary</text>
  </g>

  <!-- ===================== LEGEND ===================== -->
  <g font-size="11" fill="#475569">
    <text x="500" y="1858" text-anchor="middle" class="phase-title">Legend</text>
    <g transform="translate(150,1872)">
      <rect x="0" y="0" width="13" height="13" rx="3" fill="#ede9fe" stroke="#a78bfa"/><text x="19" y="11">UI component</text>
      <rect x="150" y="0" width="13" height="13" rx="3" fill="#d1fae5" stroke="#34d399"/><text x="169" y="11">DB operation / RPC</text>
      <rect x="340" y="0" width="13" height="13" rx="3" fill="#fef3c7" stroke="#f59e0b"/><text x="359" y="11">Medication history</text>
      <rect x="520" y="0" width="13" height="13" rx="3" fill="#ecfccb" stroke="#84cc16"/><text x="539" y="11">Output / report</text>
      <rect x="670" y="0" width="13" height="13" rx="3" fill="#dbeafe" stroke="#60a5fa"/><text x="689" y="11">Query / hook</text>
    </g>
  </g>
</svg>
</body>
</html>
